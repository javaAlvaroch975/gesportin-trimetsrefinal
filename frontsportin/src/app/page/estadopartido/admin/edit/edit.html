<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      @if (loading()) {
        <div class="text-center py-3"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Cargando...</span></div></div>
      }

      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }

      @if (!loading() && !error() && estadopartido()) {
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 border rounded bg-light p-2 mb-3">
          <div>
            <div class="text-uppercase small text-muted fw-semibold">Estados de Partido</div>
            <div class="fw-bold">Editar estado de partido</div>
          </div>
        </div>
        <app-estadopartido-admin-form
          [estadopartido]="estadopartido()"
          [isEditMode]="true"
          (formSuccess)="onFormSuccess()"
          (formCancel)="onFormCancel()"
        ></app-estadopartido-admin-form>
      }
    </div>
  </div>
</div>
